name: PySlurm

env:
  SLURM_DOCKER_IMAGE: giovtorres/slurm-docker:25.11.4-rl10

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - slurm-image: giovtorres/slurm-docker:25.11.4-rl10
            python-version: "3.12"
          - slurm-image: giovtorres/slurm-docker:25.11.4-rl9
            python-version: "3.9"
          - slurm-image: giovtorres/slurm-docker:25.11.4-rl8
            python-version: "3.6"
      fail-fast: false
    env:
      SLURM_DOCKER_IMAGE: ${{ matrix.slurm-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull Slurm container
        run: docker pull ${{ matrix.slurm-image }}

      - name: Start Slurm container
        run: docker compose up -d

      - name: Run unit tests
        run: scripts/run_tests.sh -u

      - name: Run integration tests
        run: scripts/run_tests.sh -s -i

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-sdist
    if: github.event_name == 'pull_request' || github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Pull Slurm container
        run: docker pull ${{ env.SLURM_DOCKER_IMAGE }}

      - name: Start Slurm container
        run: docker compose up -d

      - name: Build RPM
        run: scripts/build_rpm.sh

  publish:
    runs-on: ubuntu-latest
    needs: [tests, build-sdist, build-rpm]
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
